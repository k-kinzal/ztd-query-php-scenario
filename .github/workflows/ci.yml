name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly on Monday at 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  test:
    name: Scenarios — PHP ${{ matrix.php }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.3']

    env:
      MYSQL_IMAGE: 'mysql:8.0'
      POSTGRES_IMAGE: 'postgres:16'

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mysqli, pdo_mysql, pdo_pgsql, pdo_sqlite
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run scenarios
        run: vendor/bin/phpunit

      - name: Capture baseline
        if: always()
        run: php scripts/capture-baseline.php

      - name: Upload JUnit XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-php${{ matrix.php }}
          path: build/junit.xml
          retention-days: 90

      - name: Upload verification log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verification-log-php${{ matrix.php }}
          path: spec/verification-log.json
          retention-days: 90
          if-no-files-found: ignore

      - name: Upload baseline
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: baseline-php${{ matrix.php }}
          path: baseline.json
          retention-days: 90
          if-no-files-found: ignore
